services:
  steward:
    build: .
    container_name: steward
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - steward_data:/app/data
    # Uncomment for WhatsApp webhook channel:
    # command: ["--config", "/app/config/core.yml", "--channel", "whatsapp"]
    # ports:
    #   - "8765:8765"

volumes:
  steward_data:
