version: 2

project_name: steward

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: steward
    main: ./cmd/steward
    binary: steward
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

  - id: steward-satellite
    main: ./cmd/satellite
    binary: steward-satellite
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - id: steward
    builds:
      - steward
      - steward-satellite
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - config/core.yml.example
      - config/integrations/*.yml.example
      - bridge/whatsapp/index.js
      - bridge/whatsapp/package.json

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: brooqs
    name: steward
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

nfpms:
  - id: steward
    package_name: steward
    builds:
      - steward
      - steward-satellite
    vendor: brooqs
    homepage: https://github.com/brooqs/steward
    maintainer: brooqs
    description: "AI Personal Assistant — single binary, multi-provider, voice-enabled"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: config/core.yml.example
        dst: /etc/steward/core.yml.example
        type: config

brews:
  - repository:
      owner: brooqs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/brooqs/steward
    description: "AI Personal Assistant — single binary, multi-provider, voice-enabled"
    license: MIT
    dependencies:
      - name: node
    install: |
      bin.install "steward"
      bin.install "steward-satellite"

      # Create config directory
      (etc/"steward").mkpath
      (etc/"steward/integrations").mkpath
      etc.install "config/core.yml.example" => "steward/core.yml.example"

      # Create data directory
      (var/"lib/steward").mkpath

      # Install WhatsApp bridge
      (libexec/"bridge/whatsapp").install "bridge/whatsapp/index.js"
      (libexec/"bridge/whatsapp").install "bridge/whatsapp/package.json"
      cd libexec/"bridge/whatsapp" do
        system "npm", "install", "--production"
      end
    service: |
      run [opt_bin/"steward", "-config", etc/"steward/core.yml"]
      keep_alive true
      log_path var/"log/steward.log"
      error_log_path var/"log/steward.err"
    caveats: |
      To get started:
        1. cp #{etc}/steward/core.yml.example #{etc}/steward/core.yml
        2. Edit #{etc}/steward/core.yml with your provider and API key
        3. brew services start steward
        4. Open http://localhost:8080 for the admin panel

      WhatsApp bridge installed at: #{libexec}/bridge/whatsapp
        Start: node #{libexec}/bridge/whatsapp/index.js
